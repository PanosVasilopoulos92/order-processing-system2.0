spring:
  application:
    name: order-processing-system
  threads:
    virtual:
      enabled: true
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 86400000

logging:
  file:
    name: logs/ops-logs.log
